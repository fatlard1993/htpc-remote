<!doctype html>
<html lang="en">
	<head>
		<title>htpc-remote</title>

		<meta charset="UTF-8" />
		<meta http-equiv="cleartype" content="on" />

		<meta name="author" content="justfatlard" />
		<meta name="description" content="A Remote Control for HTPC" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
		<meta name="HandheldFriendly" content="true" />
		<meta name="MobileOptimized" content="320" />

		<meta name="mobile-web-app-capable" content="yes" />

		<meta name="apple-mobile-web-app-title" content="home-page" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<meta name="application-name" content="home-page" />
		<meta name="msapplication-tooltip" content="home-page" />
		<meta name="msapplication-TileColor" content="#3475b2" />

		<meta name="theme-color" content="#3475b2" />

		<link rel="manifest" href="./manifest.json" />

		<link rel="icon" type="image/svg+xml" href="./favicon.svg" />

		<!-- crypto.randomUUID exists only in secure contexts (https or
		localhost) - served over plain http on the LAN (*.home) the
		@vanilla-bean framework (hypertether/oxject) crashes without it.
		Inline and before the bundle on purpose: it has to exist before any
		module code runs. getRandomValues has no secure-context restriction. -->
		<script>
			if (!crypto.randomUUID) {
				crypto.randomUUID = () =>
					([1e7] + -1e3 + -4e3 + -8e3 + -1e11).replace(/[018]/g, c =>
						(c ^ (crypto.getRandomValues(new Uint8Array(1))[0] & (15 >> (c / 4)))).toString(16),
					);
			}
		</script>

		<script type="module" src="./index.js"></script>
	</head>
	<body></body>
</html>
